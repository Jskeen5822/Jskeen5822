<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1050" role="img" aria-label="Ten animated demos">
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#111827" />
      <animate attributeName="x1" values="0%;20%;0%" dur="18s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;80%;100%" dur="18s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="driftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#1e293b" />
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.35 0;0.35 0;-0.35 0" dur="7s" repeatCount="indefinite" />
    </linearGradient>

    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="typingClip">
      <rect x="24" y="68" width="0" height="30">
        <animate attributeName="width" values="0;300;300;0;0" dur="5s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <style>
      .card { fill: rgba(11, 18, 32, 0.88); stroke: #1f2937; stroke-width: 2; }
      .title { fill: #93c5fd; font: 700 19px 'Trebuchet MS', sans-serif; letter-spacing: 0.8px; }
      .demo { fill: #e2e8f0; font: 600 18px 'Trebuchet MS', sans-serif; }
      .meta { fill: #67e8f9; font: 500 13px 'Trebuchet MS', sans-serif; }
      .line { fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="1050" fill="url(#spaceBg)" rx="20" />

  <!-- 01 Fade + Slide -->
  <g transform="translate(40 40)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">01  Fade + Slide Reveal</text>
    <text class="meta" x="20" y="58">Opacity and position shift in one loop</text>
    <g opacity="0">
      <text class="demo" x="24" y="108">Section entering orbit...</text>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 18;0 0;0 0;0 -10" dur="4s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- 02 Staggered Entrances -->
  <g transform="translate(610 40)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">02  Staggered Item Entrances</text>
    <text class="meta" x="20" y="58">Each row delays to create stepped motion</text>

    <rect class="line" x="24" y="80" width="360" height="12" rx="6" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="x" values="18;24;24;30" dur="3.5s" begin="0s" repeatCount="indefinite" />
    </rect>
    <rect class="line" x="24" y="102" width="300" height="12" rx="6" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" dur="3.5s" begin="0.22s" repeatCount="indefinite" />
      <animate attributeName="x" values="18;24;24;30" dur="3.5s" begin="0.22s" repeatCount="indefinite" />
    </rect>
    <rect class="line" x="24" y="124" width="340" height="12" rx="6" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0" dur="3.5s" begin="0.44s" repeatCount="indefinite" />
      <animate attributeName="x" values="18;24;24;30" dur="3.5s" begin="0.44s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- 03 Lift + Glow -->
  <g transform="translate(40 240)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">03  Lift + Glow Motion</text>
    <text class="meta" x="20" y="58">Hover-like card lift simulated in a loop</text>

    <ellipse cx="276" cy="130" rx="92" ry="16" fill="#0ea5e9" opacity="0.20">
      <animate attributeName="rx" values="92;76;92" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.20;0.32;0.20" dur="2.8s" repeatCount="indefinite" />
    </ellipse>
    <g filter="url(#glowBlue)">
      <rect x="180" y="74" width="190" height="52" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="2.8s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- 04 Gradient Drift -->
  <g transform="translate(610 240)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">04  Gradient Drift Field</text>
    <text class="meta" x="20" y="58">Animated color flow across the surface</text>

    <rect x="24" y="74" width="502" height="72" rx="10" fill="url(#driftGrad)" opacity="0.90" />
    <rect x="24" y="74" width="502" height="72" rx="10" fill="none" stroke="#67e8f9" stroke-opacity="0.45" />
  </g>

  <!-- 05 Pulse Border -->
  <g transform="translate(40 440)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">05  Pulsing Border + Shadow</text>
    <text class="meta" x="20" y="58">Stroke and glow pulse together</text>

    <rect x="145" y="68" width="260" height="74" rx="14" fill="#0b1220" stroke="#38bdf8" stroke-width="2" opacity="0.92" />
    <rect x="145" y="68" width="260" height="74" rx="14" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.40" filter="url(#glowBlue)">
      <animate attributeName="stroke-width" values="2;6;2" dur="2.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.22;0.55;0.22" dur="2.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- 06 Floating + Rotating -->
  <g transform="translate(610 440)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">06  Floating + Rotating Shapes</text>
    <text class="meta" x="20" y="58">Orbiting particles with subtle drift</text>

    <g transform="translate(275 110)">
      <circle cx="0" cy="0" r="26" fill="#0f172a" stroke="#67e8f9" stroke-opacity="0.6" />
      <circle cx="-90" cy="0" r="8" fill="#38bdf8">
        <animateTransform attributeName="transform" type="rotate" values="0 90 0;360 90 0" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="90" cy="0" r="8" fill="#93c5fd">
        <animateTransform attributeName="transform" type="rotate" values="360 -90 0;0 -90 0" dur="6s" repeatCount="indefinite" />
      </circle>
      <polygon points="0,-44 9,-28 -9,-28" fill="#67e8f9">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="2.6s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" additive="sum" type="rotate" values="0 0 0;360 0 0" dur="4s" repeatCount="indefinite" />
      </polygon>
    </g>
  </g>

  <!-- 07 Scanning Divider -->
  <g transform="translate(40 640)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">07  Scanning Divider Beam</text>
    <text class="meta" x="20" y="58">A bright scanner sweeps across the line</text>

    <line x1="24" y1="104" x2="526" y2="104" stroke="#334155" stroke-width="2" />
    <rect x="24" y="98" width="90" height="12" rx="6" fill="#67e8f9" opacity="0.85" filter="url(#glowBlue)">
      <animate attributeName="x" values="24;436;24" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- 08 Typing Cursor -->
  <g transform="translate(610 640)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">08  Typing + Cursor Blink</text>
    <text class="meta" x="20" y="58">Text reveal with animated clipping</text>

    <text class="demo" x="24" y="92" clip-path="url(#typingClip)">Compiling Skevia modules...</text>
    <rect x="24" y="68" width="2" height="30" fill="#67e8f9">
      <animate attributeName="x" values="24;324;324;24;24" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;1;0;0;1" dur="5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- 09 Wave + Twinkle -->
  <g transform="translate(40 840)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">09  Wave + Twinkle Field</text>
    <text class="meta" x="20" y="58">Wave band and star pulses in sync</text>

    <g>
      <path d="M24,112 C92,92 158,130 226,112 C294,94 362,130 430,112 C462,104 494,104 526,112" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.85">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="3s" repeatCount="indefinite" />
      </path>
      <circle cx="88" cy="78" r="3" fill="#bae6fd">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite" />
      </circle>
      <circle cx="276" cy="72" r="3" fill="#bae6fd">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.4s" repeatCount="indefinite" />
      </circle>
      <circle cx="468" cy="82" r="3" fill="#bae6fd">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.7s" begin="0.8s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- 10 Looping SVG Embed -->
  <g transform="translate(610 840)">
    <rect class="card" x="0" y="0" width="550" height="170" rx="18" />
    <text class="title" x="20" y="36">10  Looping SVG Embed</text>
    <text class="meta" x="20" y="58">Continuous motion loop for README embedding</text>

    <g transform="translate(275 108)">
      <circle cx="0" cy="0" r="34" fill="none" stroke="#1f2937" stroke-width="8" />
      <circle cx="0" cy="0" r="34" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round" stroke-dasharray="44 180">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="-52" r="6" fill="#93c5fd">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="2.5s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
</svg>
