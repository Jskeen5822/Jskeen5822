<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" role="img" aria-label="Jonathon Skeen">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="45%" stop-color="#100828"/>
      <stop offset="100%" stop-color="#061e24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#22d3ee;#a3e635;#fbbf24;#f472b6" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#c084fc;#fb7185;#22d3ee" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#f97316;#06b6d4;#a78bfa" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1" fill="#fef3c7" opacity="0.035"/>
    </pattern>
    <clipPath id="clipLine">
      <rect x="64" y="182" width="972" height="4" rx="2"/>
    </clipPath>
    <clipPath id="waveBand">
      <rect x="0" y="138" width="1100" height="90"/>
    </clipPath>
  </defs>
  <rect width="1100" height="260" fill="url(#bg)"/>
  <rect width="1100" height="260" fill="url(#grid)"/>
  <g clip-path="url(#waveBand)">
    <path d="M64 156 C 240 146, 400 170, 560 156 S 840 150 1036 164" fill="none" stroke="url(#accent)" stroke-width="2.4" stroke-linecap="round" opacity="0.82">
      <animate attributeName="stroke-dasharray" values="4 14;12 6;6 18;4 14" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.92;0.55" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g clip-path="url(#clipLine)">
    <rect x="64" y="182" width="972" height="4" rx="2" fill="#1e1b4b" opacity="0.75"/>
    <rect x="-200" y="182" width="160" height="4" rx="2" fill="url(#accent)" opacity="0.42">
      <animate attributeName="x" from="-200" to="1100" dur="11s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0.9">
    <rect x="64" y="206" width="3" height="18" rx="1.5" fill="#f472b6">
      <animate attributeName="height" values="10;22;14;22;10" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="212;200;208;200;212" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#f472b6;#22d3ee;#f472b6" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="92" y="200" width="3" height="24" rx="1.5" fill="#22d3ee">
      <animate attributeName="height" values="24;12;28;16;24" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="y" values="196;208;192;204;196" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="fill" values="#22d3ee;#a3e635;#22d3ee" dur="9s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="120" y="198" width="3" height="26" rx="1.5" fill="#a3e635">
      <animate attributeName="height" values="18;30;14;26;18" dur="2.9s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="y" values="204;192;208;198;204" dur="2.9s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="fill" values="#a3e635;#fbbf24;#a3e635" dur="7.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="148" y="202" width="3" height="22" rx="1.5" fill="#fbbf24">
      <animate attributeName="height" values="26;10;24;18;26" dur="3.4s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="198;214;201;207;198" dur="3.4s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="fill" values="#fbbf24;#c084fc;#fbbf24" dur="8.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="176" y="206" width="3" height="18" rx="1.5" fill="#c084fc">
      <animate attributeName="height" values="14;26;16;22;14" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
      <animate attributeName="y" values="208;196;206;200;208" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
      <animate attributeName="fill" values="#c084fc;#fb7185;#c084fc" dur="10s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>
  <text x="64" y="88" fill="#fefce8" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="42" font-weight="700" letter-spacing="-0.02em">Jonathon Skeen</text>
  <text x="64" y="121" fill="#a5f3fc" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="13.5" letter-spacing="0.05em">CS @ OHIO UNIVERSITY - MARIETTA, OH &#183; LOW-LEVEL SYSTEMS</text>
  <circle cx="1036" cy="72" r="6" fill="#34d399">
    <animate attributeName="fill" values="#34d399;#fbbf24;#60a5fa;#34d399" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="1012" y="77" text-anchor="end" fill="#fde68a" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12">live</text>
</svg>
