<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" role="img" aria-label="Jonathon Skeen">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070708"/>
      <stop offset="55%" stop-color="#0c1016"/>
      <stop offset="100%" stop-color="#111822"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399">
        <animate attributeName="stop-color" values="#34d399;#22d3ee;#fbbf24;#34d399" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#34d399;#a78bfa;#22d3ee" dur="14s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1" fill="#e2e8f0" opacity="0.06"/>
    </pattern>
    <clipPath id="clipLine">
      <rect x="64" y="172" width="972" height="4" rx="2"/>
    </clipPath>
  </defs>
  <rect width="1100" height="260" fill="url(#bg)"/>
  <rect width="1100" height="260" fill="url(#grid)"/>
  <path d="M64 132 C 220 92, 380 188, 540 132 S 820 72, 1036 118" fill="none" stroke="url(#accent)" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
    <animate attributeName="stroke-dasharray" values="4 14;12 6;6 18;4 14" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="6s" repeatCount="indefinite"/>
  </path>
  <!-- Sweep highlight -->
  <g clip-path="url(#clipLine)">
    <rect x="64" y="172" width="972" height="4" rx="2" fill="#1e293b" opacity="0.65"/>
    <rect x="-200" y="172" width="160" height="4" rx="2" fill="url(#accent)" opacity="0.35">
      <animate attributeName="x" from="-200" to="1100" dur="11s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Signal ticks -->
  <g opacity="0.9">
    <rect x="64" y="196" width="3" height="18" rx="1.5" fill="#64748b">
      <animate attributeName="height" values="10;22;14;22;10" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="202;190;198;190;202" dur="2.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="92" y="190" width="3" height="24" rx="1.5" fill="#64748b">
      <animate attributeName="height" values="24;12;28;16;24" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="y" values="186;198;182;194;186" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="120" y="188" width="3" height="26" rx="1.5" fill="#64748b">
      <animate attributeName="height" values="18;30;14;26;18" dur="2.9s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="y" values="194;182;198;188;194" dur="2.9s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <rect x="148" y="192" width="3" height="22" rx="1.5" fill="#64748b">
      <animate attributeName="height" values="26;10;24;18;26" dur="3.4s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="188;204;191;197;188" dur="3.4s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="176" y="196" width="3" height="18" rx="1.5" fill="#64748b">
      <animate attributeName="height" values="14;26;16;22;14" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
      <animate attributeName="y" values="198;186;196;190;198" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
  </g>
  <text x="64" y="98" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="42" font-weight="700" letter-spacing="-0.02em">Jonathon Skeen</text>
  <text x="64" y="132" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14" letter-spacing="0.06em">CS @ OHIO UNIVERSITY &#183; MARIETTA, OH &#183; LOW-LEVEL SYSTEMS</text>
  <circle cx="1036" cy="72" r="6" fill="#34d399">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="1012" y="77" text-anchor="end" fill="#64748b" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12">live</text>
</svg>
