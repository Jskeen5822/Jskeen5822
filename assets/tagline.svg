<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 100" role="img" aria-label="Rotating taglines">
  <defs>
    <linearGradient id="rim" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="18%" stop-color="#f97316"/>
      <stop offset="36%" stop-color="#eab308"/>
      <stop offset="52%" stop-color="#22c55e"/>
      <stop offset="68%" stop-color="#06b6d4"/>
      <stop offset="84%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-240 0" to="240 0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0614"/>
      <stop offset="40%" stop-color="#12082c"/>
      <stop offset="100%" stop-color="#051a1f"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="100" rx="12" fill="url(#sky)"/>
  <circle cx="160" cy="28" r="88" fill="#ec4899" opacity="0.14"/>
  <circle cx="940" cy="72" r="100" fill="#06b6d4" opacity="0.12"/>
  <circle cx="560" cy="8" r="64" fill="#a3e635" opacity="0.09"/>
  <rect x="48" y="22" width="1004" height="3" rx="1.5" fill="url(#rim)" opacity="0.95"/>
  <text x="550" y="58" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="17" font-weight="600" letter-spacing="0.01em">
    Shipping firmware-minded software.
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.289;0.333;0.956;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <text x="550" y="58" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="17" font-weight="600" letter-spacing="0.01em">
    Perea &#8212; isolation, ergonomics, one kernel at a time.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.289;0.333;0.622;0.667;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <text x="550" y="58" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="17" font-weight="600" letter-spacing="0.01em">
    Embedded &#183; operating systems &#183; databases
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.62;0.668;0.672;0.956;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <rect x="48" y="76" width="1004" height="2" rx="1" fill="#334155" opacity="0.45"/>
  <rect x="48" y="76" width="160" height="2" rx="1" fill="url(#rim)">
    <animate attributeName="x" values="48;892;48" dur="7.5s" repeatCount="indefinite"/>
  </rect>
</svg>
